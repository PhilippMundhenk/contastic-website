services:
  website:
    build: .
    image: ghcr.io/philippmundhenk/contastic-website:latest
    restart: always
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.contastic-website.rule=Host(`contastic.mundhenk.info`)"
      - "traefik.http.routers.contastic-website.entrypoints=websecure"
      - "traefik.http.routers.contastic-website.tls.certresolver=letsencrypt"
      - "traefik.http.services.contastic-website.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
